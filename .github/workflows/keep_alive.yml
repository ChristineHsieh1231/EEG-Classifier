name: Streamlit Keep-Alive

on:
  schedule:
    # 使用 Cron 語法設定時間。此處設定為「每 10 小時執行一次」
    # 確保在 Streamlit 的 12 小時休眠期限內觸發
    - cron: '0 */10 * * *'
  
  # 允許你隨時在 GitHub 網頁上手動點擊按鈕執行此腳本
  workflow_dispatch:

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    
    # 給予腳本寫入 Repository 的權限
    permissions:
      contents: write

    steps:
      # 1. 下載你的專案程式碼
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. 設定一個虛擬的 Git 使用者身分
      - name: Setup Git User
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      # 3. 建立空的 Commit 並推送到專案中
      - name: Create Empty Commit and Push
        run: |
          git commit --allow-empty -m "chore: auto keep-alive to prevent Streamlit hibernation"
          git push
