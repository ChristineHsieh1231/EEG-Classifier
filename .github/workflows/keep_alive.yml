name: Wake up Streamlit App Daily

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: 

jobs:
  ping_app:
    runs-on: ubuntu-latest
    steps:
      - name: Send a request to the app
        run: |
          # 1. 使用 -A 模擬 Chrome 瀏覽器 (User-Agent)
          # 2. 使用 --max-redirs 限制跳轉次數，避免死循環
          # 3. 使用 -k 忽略 SSL 檢查 (有時跳轉會導致證書不匹配)
          # 4. 去掉 -I，改用一般的 GET 請求 (有些伺服器會擋掉 HEAD 請求)
          curl -s -L --max-redirs 5 -k -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" https://seizureclassifierapp.streamlit.app/
