name: Wake up Streamlit App Daily

on:
  schedule:
    # 每天午夜 (UTC 00:00) 執行一次
    - cron: '0 0 * * *'
  workflow_dispatch: # 保留手動執行按鈕，方便你隨時測試

jobs:
  ping_app:
    runs-on: ubuntu-latest
    steps:
      - name: Send a request to the app
        run: |
          # -I 僅請求標頭，-L 自動跟隨重導向，-s 靜音模式
          curl -I -L -s https://seizureclassifierapp.streamlit.app/
